<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Projeto 200</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/200/project.css" />
</head>
<body>
  <main class="project-shell">
    <section class="project-hub" aria-label="Projeto 200">
      <button class="hub-action" type="button" data-open-modal="actionsModal">
        <span class="hub-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M9 4h6l1 2h3v14H5V6h3zm1.2 5.8-1.4 1.4 2.4 2.4 4.9-4.9-1.4-1.4-3.5 3.5z"/></svg>
        </span>
        <span>Ações</span>
      </button>
      <button class="hub-action" type="button" data-open-modal="constitutionModal">
        <span class="hub-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M6 3h11a2 2 0 0 1 2 2v16H7a2 2 0 0 1-2-2V4a1 1 0 0 1 1-1m2 4v2h8V7zm0 4v2h8v-2zm0 4v2h5v-2z"/></svg>
        </span>
        <span>Constituição</span>
      </button>
      <button class="hub-action" type="button" data-open-modal="financeModal">
        <span class="hub-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M4 7h16v12H4zm2 3v6h12v-6zm5 1h2v1h2v2h-2v1h-2v-1H9v-2h2z"/></svg>
        </span>
        <span>Finanças</span>
      </button>
      <button class="hub-action" type="button" data-open-modal="calendarModal">
        <span class="hub-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M7 2h2v3h6V2h2v3h3v16H4V5h3zm11 8H6v9h12z"/></svg>
        </span>
        <span>Calendário</span>
      </button>
      <button class="hub-action" type="button" data-open-modal="statsModal">
        <span class="hub-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M5 19V5h2v14zm6 0V9h2v10zm6 0V3h2v16z"/></svg>
        </span>
        <span>Estatísicas</span>
      </button>
      <button class="hub-action" type="button" data-open-modal="historyModal">
        <span class="hub-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 5a7 7 0 1 1-6.3 4H3l4-4 4 4H8a5 5 0 1 0 4-2zm-1 3h2v4l3 2-1 1.7-4-2.4z"/></svg>
        </span>
        <span>Histórico</span>
      </button>
    </section>
  </main>

  <section class="workspace-modal" id="actionsModal" aria-hidden="true" aria-label="Ações">
    <button class="modal-close" type="button" data-close-modal aria-label="Fechar">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 7.4 1.4-1.4 4.6 4.6L16.6 6 18 7.4 13.4 12l4.6 4.6-1.4 1.4-4.6-4.6L7.4 18 6 16.6l4.6-4.6z"/></svg>
    </button>

    <div class="actions-app">
      <header class="actions-head">
        <button class="circle-nav" type="button" data-day-nav="-1" aria-label="Data anterior">
          <svg viewBox="0 0 24 24"><path d="M15.4 5.4 14 4l-8 8 8 8 1.4-1.4L8.8 12z"/></svg>
        </button>
        <button class="date-title" type="button" id="activeDateLabel">Hoje</button>
          <button class="circle-nav" type="button" data-day-nav="1" aria-label="Próxima data">
          <svg viewBox="0 0 24 24"><path d="M8.6 18.6 10 20l8-8-8-8-1.4 1.4 6.6 6.6z"/></svg>
        </button>
      </header>

      <div class="auth-alert" id="actionsAuthAlert" hidden>
        <span>Entre na sua conta para salvar a agenda.</span>
        <a href="/auth.html?next=/200">Entrar</a>
      </div>

      <div class="actions-list" id="actionsList" aria-live="polite"></div>
      <footer class="actions-progress" id="actionsProgress" hidden>
        <div class="actions-progress-head">
          <strong id="actionsProgressLabel">0% concluido</strong>
          <span id="actionsProgressMinutes">0/0 min</span>
        </div>
        <div class="actions-progress-track" role="progressbar" aria-label="Progresso diario de tarefas" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="actions-progress-fill" id="actionsProgressFill"></div>
        </div>
      </footer>
      <button class="floating-add" type="button" id="openActionWizard">Adicionar tarefa</button>
    </div>

    <div class="action-wizard" id="actionWizard" aria-hidden="true">
      <div class="wizard-panel">
        <header class="wizard-head">
          <span id="wizardStepLabel">1 de 4</span>
          <button class="wizard-close" type="button" id="closeActionWizard" aria-label="Fechar etapa">
            <svg viewBox="0 0 24 24"><path d="m6 7.4 1.4-1.4 4.6 4.6L16.6 6 18 7.4 13.4 12l4.6 4.6-1.4 1.4-4.6-4.6L7.4 18 6 16.6l4.6-4.6z"/></svg>
          </button>
        </header>

        <form id="actionForm">
          <section class="wizard-step active" data-step="1">
            <label class="step-label" for="taskTitle">Titulo da Tarefa</label>
            <input id="taskTitle" class="text-field" name="title" autocomplete="off" maxlength="80" />
          </section>

          <section class="wizard-step" data-step="2">
            <span class="step-label">Data</span>
            <div class="date-picker">
              <button class="circle-nav" type="button" data-wizard-date="-1" aria-label="Data anterior">
                <svg viewBox="0 0 24 24"><path d="M15.4 5.4 14 4l-8 8 8 8 1.4-1.4L8.8 12z"/></svg>
              </button>
              <strong id="wizardDateLabel">Hoje</strong>
              <button class="circle-nav" type="button" data-wizard-date="1" aria-label="Próxima data">
                <svg viewBox="0 0 24 24"><path d="M8.6 18.6 10 20l8-8-8-8-1.4 1.4 6.6 6.6z"/></svg>
              </button>
            </div>

            <div class="repeat-box" id="repeatBox" hidden>
              <div class="repeat-presets">
                <button type="button" data-repeat-mode="daily">Diariamente</button>
                <button type="button" data-repeat-mode="weekdays">Segunda a Sexta</button>
              </div>
              <div class="weekday-row" id="weekdayRow" aria-label="Dias da semana"></div>
            </div>

            <button class="repeat-toggle" type="button" id="repeatToggle" aria-label="Editar repetição">
              <svg viewBox="0 0 24 24"><path d="M4 17.5V20h2.5L17.1 9.4l-2.5-2.5zm14.1-9.1 1.2-1.2a1 1 0 0 0 0-1.4l-1.1-1.1a1 1 0 0 0-1.4 0l-1.2 1.2z"/></svg>
            </button>
          </section>

          <section class="wizard-step" data-step="3">
            <span class="step-label">Horario inicio</span>
            <div class="time-picker" data-time-picker="start"></div>
          </section>

          <section class="wizard-step" data-step="4">
            <span class="step-label">Horario fim</span>
            <div class="time-picker" data-time-picker="end"></div>
          </section>

          <p class="wizard-message" id="wizardMessage" role="status"></p>

          <footer class="wizard-actions">
            <button class="ghost-btn" type="button" id="wizardBack">Voltar</button>
            <button class="primary-btn" type="button" id="wizardNext">Continuar</button>
          </footer>
        </form>
      </div>
    </div>
  </section>

  <section class="workspace-modal simple-modal" id="constitutionModal" aria-hidden="true" aria-label="Constituição">
    <button class="modal-close" type="button" data-close-modal aria-label="Fechar"><svg viewBox="0 0 24 24"><path d="m6 7.4 1.4-1.4 4.6 4.6L16.6 6 18 7.4 13.4 12l4.6 4.6-1.4 1.4-4.6-4.6L7.4 18 6 16.6l4.6-4.6z"/></svg></button>
    <h1>Constituição</h1>
  </section>

  <section class="workspace-modal simple-modal finance-modal" id="financeModal" aria-hidden="true" aria-label="Finanças">
    <button class="modal-close" type="button" data-close-modal aria-label="Fechar"><svg viewBox="0 0 24 24"><path d="m6 7.4 1.4-1.4 4.6 4.6L16.6 6 18 7.4 13.4 12l4.6 4.6-1.4 1.4-4.6-4.6L7.4 18 6 16.6l4.6-4.6z"/></svg></button>
    <div class="finance-content">
      <h1 id="financeIntroTitle">Finanças</h1>
      <div class="finance-period-picker" id="financePeriodPicker" hidden>
        <button class="circle-nav" type="button" id="financePeriodPrev" aria-label="Periodo anterior">‹</button>
        <span class="finance-period-label" id="financePeriodLabel">Total</span>
        <button class="circle-nav" type="button" id="financePeriodNext" aria-label="Proximo periodo">›</button>
      </div>
      <div class="finance-dashboard" id="financeDashboard" hidden>
        <article class="finance-metric">
          <span id="financeSalesLabel">Total de vendas</span>
          <strong id="financeTotalSales">R$ 0,00</strong>
        </article>
        <article class="finance-metric">
          <span>Assinantes atuais</span>
          <strong id="financeSubscribers">0</strong>
        </article>
        <article class="finance-metric">
          <span>Renda mensal</span>
          <strong id="financeMonthlyRevenue">R$ 0,00</strong>
        </article>
      </div>
      <p class="finance-status" id="financeStatus" aria-live="polite"></p>
    </div>
  </section>

  <section class="workspace-modal simple-modal" id="calendarModal" aria-hidden="true" aria-label="Calendário">
    <button class="modal-close" type="button" data-close-modal aria-label="Fechar"><svg viewBox="0 0 24 24"><path d="m6 7.4 1.4-1.4 4.6 4.6L16.6 6 18 7.4 13.4 12l4.6 4.6-1.4 1.4-4.6-4.6L7.4 18 6 16.6l4.6-4.6z"/></svg></button>
    <h1>Calendário</h1>
  </section>

  <section class="workspace-modal simple-modal" id="statsModal" aria-hidden="true" aria-label="Estatísicas">
    <button class="modal-close" type="button" data-close-modal aria-label="Fechar"><svg viewBox="0 0 24 24"><path d="m6 7.4 1.4-1.4 4.6 4.6L16.6 6 18 7.4 13.4 12l4.6 4.6-1.4 1.4-4.6-4.6L7.4 18 6 16.6l4.6-4.6z"/></svg></button>
    <h1>Estatísicas</h1>
  </section>

  <section class="workspace-modal simple-modal" id="historyModal" aria-hidden="true" aria-label="Histórico">
    <button class="modal-close" type="button" data-close-modal aria-label="Fechar"><svg viewBox="0 0 24 24"><path d="m6 7.4 1.4-1.4 4.6 4.6L16.6 6 18 7.4 13.4 12l4.6 4.6-1.4 1.4-4.6-4.6L7.4 18 6 16.6l4.6-4.6z"/></svg></button>
    <h1>Histórico</h1>
  </section>

  <script type="module" src="/200/project.js"></script>
</body>
</html>
