<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini</title>
  <style>
    :root {
      color-scheme: only light;
      --bg: #ffffff;
      --text: #1b1b1b;
      --muted: #6f7683;
      --border: #eceff4;
      --hot-1: linear-gradient(145deg, #ff8a47, #f8d94a);
      --hot-2: linear-gradient(145deg, #6bc6ff, #3a69f5);
      --hot-3: linear-gradient(145deg, #b762ff, #6b59f4);
      --hot-4: linear-gradient(145deg, #ffd44d, #ffb300);
      --hot-5: linear-gradient(145deg, #2f58d8, #17205f);
      --ok: linear-gradient(145deg, #56d26f, #1f9f52);
      --danger: linear-gradient(145deg, #ff8a6b, #ec4c3a);
      --edit: linear-gradient(145deg, #67c9ff, #3862fa);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }
    .app {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 18px 16px 26px;
      gap: 22px;
    }
    .mini-logo {
      width: min(88vw, 460px);
      max-height: 35vh;
      object-fit: contain;
    }
    .actions-5 {
      width: min(88vw, 460px);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      align-items: center;
    }
    .icon-chip {
      border: 0;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 0;
      color: #30333c;
      font-size: 12px;
      cursor: default;
    }
    .icon-ball {
      width: 54px;
      height: 54px;
      border-radius: 17px;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.12);
    }
    .g-red { background: var(--hot-1); }
    .g-blue { background: var(--hot-2); }
    .g-purple { background: var(--hot-3); }
    .g-gold { background: var(--hot-4); }
    .g-navy { background: var(--hot-5); }
    .icon-ball svg { width: 28px; height: 28px; fill: #fff; }

    .immersive {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 20;
      transform: translateY(100%);
      opacity: 0;
      pointer-events: none;
      transition: transform 260ms ease, opacity 200ms ease;
      display: grid;
      grid-template-rows: auto 60vh auto 10vh;
      padding: 14px 12px 8px;
    }
    .immersive.show {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    .modal-head {
      text-align: center;
      padding: 4px 0 6px;
    }
    .modal-head h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }
    .deck {
      border-radius: 22px;
      border: 1px solid var(--border);
      padding: 12px 10px;
      display: grid;
      grid-template-columns: 1fr 40px;
      gap: 10px;
      overflow: hidden;
    }
    .rows {
      display: grid;
      grid-template-rows: repeat(6, 1fr);
      gap: 8px;
      min-height: 0;
    }
    .card {
      min-height: 8vh;
      border-radius: 14px;
      display: grid;
      align-content: center;
      padding: 8px 12px;
      color: #1f2430;
      background: #f4f7fb;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .card h4 {
      margin: 0;
      font-size: 14px;
      line-height: 1.15;
    }
    .card p {
      margin: 4px 0 0;
      font-size: 11px;
      color: #475067;
    }
    .card .bar {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 10px;
      opacity: 0.9;
    }
    .timeline {
      border-radius: 12px;
      background: #f2f5fb;
      padding: 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
    }
    .timeline .seg {
      width: 100%;
      border-radius: 8px;
    }
    .pager {
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 13px;
      color: #4e5568;
    }
    .pill-btn {
      border: 0;
      border-radius: 999px;
      min-width: 34px;
      height: 34px;
      background: #eef3fa;
      color: #2d3345;
      font-size: 19px;
      cursor: pointer;
    }
    .total-time {
      display: grid;
      place-items: center;
      padding-top: 4px;
      gap: 3px;
    }
    .total-time strong {
      font-size: 44px;
      line-height: 1;
    }
    .total-time small {
      font-size: 12px;
      color: #5e677c;
    }
    .footer-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: center;
      justify-items: center;
    }
    .round-action {
      border: 0;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      color: #fff;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.14);
      cursor: pointer;
    }
    .round-action svg { width: 28px; height: 28px; fill: #fff; }
    .round-action.plus { background: var(--ok); }
    .round-action.close { background: var(--danger); }
    .round-action.edit { background: var(--edit); }

    .step-modal {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 30;
      transform: scale(0.96);
      opacity: 0;
      pointer-events: none;
      transition: transform 180ms ease, opacity 180ms ease;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 20px 14px 14px;
    }
    .step-modal.show {
      transform: scale(1);
      opacity: 1;
      pointer-events: auto;
    }
    .step-title {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
    }
    .minute-pick {
      display: grid;
      place-items: center;
      gap: 8px;
    }
    .pick-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .arrow {
      border: 0;
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: #edf2fa;
      color: #394058;
      font-size: 32px;
      line-height: 1;
      cursor: pointer;
    }
    #minuteValue {
      min-width: 100px;
      text-align: center;
      font-size: 64px;
      font-weight: 800;
      line-height: 1;
    }
    #minuteLabel {
      color: #596178;
      font-size: 13px;
    }
    .step-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    .step-actions button {
      flex: 1;
      border: 0;
      border-radius: 14px;
      height: 50px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-cancel { background: #ff7360; }
    .btn-apply { background: #26b35e; }
  </style>
</head>
<body>
  <main class="app">
    <img class="mini-logo" src="/mini/mini.png" alt="Mini" />
    <section class="actions-5">
      <button class="icon-chip" type="button"><span class="icon-ball g-red"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7zM4 5h2v14H4z"/></svg></span><span>Midia</span></button>
      <button class="icon-chip" type="button"><span class="icon-ball g-blue"><svg viewBox="0 0 24 24"><path d="M12 3 1 9l11 6 9-4.91V17h2V9L12 3zm0 13L5 12.18v3.27L12 19l7-3.55v-3.27L12 16z"/></svg></span><span>Cursos</span></button>
      <button class="icon-chip" type="button"><span class="icon-ball g-purple"><svg viewBox="0 0 24 24"><path d="M4 4h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H8l-5 4v-4H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg></span><span>Criar</span></button>
      <button id="openAulas" class="icon-chip" type="button"><span class="icon-ball g-gold"><svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zM8 7h8v2H8V7zm0 4h8v2H8v-2zm0 4h5v2H8v-2z"/></svg></span><span>Aulas</span></button>
      <button class="icon-chip" type="button"><span class="icon-ball g-navy"><svg viewBox="0 0 24 24"><path d="M4 13h6v7H4zm10-9h6l-1 6h-4v4l-5 3V7z"/></svg></span><span>Liderar</span></button>
    </section>
  </main>

  <section id="aulasModal" class="immersive" aria-hidden="true">
    <header class="modal-head"><h2>Cronograma de Aulas</h2></header>
    <div class="deck">
      <div>
        <div id="selectedRows" class="rows"></div>
        <div class="pager">
          <button id="selPrev" class="pill-btn" type="button">&#8249;</button>
          <span id="selPage">1 / 1</span>
          <button id="selNext" class="pill-btn" type="button">&#8250;</button>
        </div>
      </div>
      <div id="timeline" class="timeline"></div>
    </div>
    <div class="total-time">
      <strong id="totalMinutes">0</strong>
      <small id="totalLabel">minuto total</small>
    </div>
    <footer class="footer-actions">
      <button id="closeAulas" class="round-action close" type="button"><svg viewBox="0 0 24 24"><path d="M18.3 5.71 12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.29 19.7 2.88 18.3 9.17 12 2.88 5.71 4.29 4.29l6.3 6.3 6.29-6.3z"/></svg></button>
      <button id="openSelector" class="round-action plus" type="button"><svg viewBox="0 0 24 24"><path d="M19 11H13V5h-2v6H5v2h6v6h2v-6h6z"/></svg></button>
      <button class="round-action edit" type="button"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75l11-11.03-3.75-3.75L3 17.25zm17.71-10.04a1.003 1.003 0 0 0 0-1.42l-2.5-2.5a1.003 1.003 0 0 0-1.42 0l-1.83 1.83 3.75 3.75 2-1.66z"/></svg></button>
    </footer>
  </section>

  <section id="selectorModal" class="immersive" aria-hidden="true">
    <header class="modal-head"><h2>Selecionar Blocos</h2></header>
    <div class="deck">
      <div>
        <div id="poolRows" class="rows"></div>
        <div class="pager">
          <button id="poolPrev" class="pill-btn" type="button">&#8249;</button>
          <span id="poolPage">1 / 1</span>
          <button id="poolNext" class="pill-btn" type="button">&#8250;</button>
        </div>
      </div>
      <div class="timeline" id="poolLine"></div>
    </div>
    <div class="total-time">
      <strong id="poolCounter">48</strong>
      <small>blocos disponiveis</small>
    </div>
    <footer class="footer-actions">
      <button id="closeSelector" class="round-action close" type="button"><svg viewBox="0 0 24 24"><path d="M18.3 5.71 12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.29 19.7 2.88 18.3 9.17 12 2.88 5.71 4.29 4.29l6.3 6.3 6.29-6.3z"/></svg></button>
      <button class="round-action plus" type="button"><svg viewBox="0 0 24 24"><path d="M19 11H13V5h-2v6H5v2h6v6h2v-6h6z"/></svg></button>
      <button class="round-action edit" type="button"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75l11-11.03-3.75-3.75L3 17.25zm17.71-10.04a1.003 1.003 0 0 0 0-1.42l-2.5-2.5a1.003 1.003 0 0 0-1.42 0l-1.83 1.83 3.75 3.75 2-1.66z"/></svg></button>
    </footer>
  </section>

  <section id="minuteModal" class="step-modal" aria-hidden="true">
    <div class="step-title" id="stepName">Definir tempo</div>
    <div class="minute-pick">
      <div class="pick-row">
        <button id="minDown" class="arrow" type="button">&#8249;</button>
        <div id="minuteValue">5</div>
        <button id="minUp" class="arrow" type="button">&#8250;</button>
      </div>
      <div id="minuteLabel">5 minutos</div>
    </div>
    <div class="step-actions">
      <button id="cancelMinute" class="btn-cancel" type="button">Cancelar</button>
      <button id="applyMinute" class="btn-apply" type="button">Adicionar</button>
    </div>
  </section>

  <script>
    const warmPalette = ["#ff8a47", "#ffa657", "#ffbf54", "#f9d94a", "#ff6f61", "#ff8cc8", "#6bc6ff", "#7b8cff"];
    const gradients = [
      "linear-gradient(145deg,#ff9a5c,#f5d74f)",
      "linear-gradient(145deg,#ffa874,#ff8052)",
      "linear-gradient(145deg,#ffda5a,#ffb84d)",
      "linear-gradient(145deg,#ffd94f,#ffb100)",
      "linear-gradient(145deg,#ff8b79,#ff5f4a)",
      "linear-gradient(145deg,#d183ff,#8f67ff)",
      "linear-gradient(145deg,#70cbff,#4f8aff)",
      "linear-gradient(145deg,#5e72ff,#3751df)"
    ];

    const baseBlocks = [
      "Check-in", "Entrega de cracha", "Boas-vindas", "Chamada", "Quebra-gelo", "Abertura", "Hino oficial", "Oracao inicial", "Louvor", "Louvor com gestos", "Versiculo do dia", "Memorizacao biblica",
      "Introducao do tema", "Historia com tema", "Historia biblica", "Mensagem", "Aplicacao pratica", "Oracao apos mensagem", "Pedidos de oracao", "Teatro", "Fantoches", "Encenacao rapida", "Ilustracao visual", "Video curto",
      "Desenho ou filme", "Explicar dinamica", "Dinamica", "Explicar jogo", "Jogo", "Desafio", "Atividade impressa", "Atividade manual", "Atividade em grupo", "Perguntas e respostas", "Quiz biblico", "Revisao da aula",
      "Fazer em casa", "Explicar projeto", "Projeto em andamento", "Ensaio", "Apresentacao", "Aniversarios", "Momento oferta", "Oracao da oferta", "Lanche", "Hora da foto", "Oracao final", "Check-out"
    ].map((name, i) => ({ id: i + 1, name, color: warmPalette[i % warmPalette.length], gradient: gradients[i % gradients.length] }));

    const state = {
      selected: [],
      poolPage: 0,
      selectedPage: 0,
      currentPick: null,
      currentMinutes: 5
    };

    const el = {
      aulasModal: document.getElementById("aulasModal"),
      selectorModal: document.getElementById("selectorModal"),
      minuteModal: document.getElementById("minuteModal"),
      selectedRows: document.getElementById("selectedRows"),
      poolRows: document.getElementById("poolRows"),
      timeline: document.getElementById("timeline"),
      poolLine: document.getElementById("poolLine"),
      totalMinutes: document.getElementById("totalMinutes"),
      totalLabel: document.getElementById("totalLabel"),
      poolCounter: document.getElementById("poolCounter"),
      minuteValue: document.getElementById("minuteValue"),
      minuteLabel: document.getElementById("minuteLabel"),
      stepName: document.getElementById("stepName"),
      selPage: document.getElementById("selPage"),
      poolPage: document.getElementById("poolPage")
    };

    const pageSize = 6;

    function toHoursText(minutes) {
      if (minutes < 60) return minutes === 1 ? "1 minuto" : minutes + " minutos";
      const h = Math.floor(minutes / 60);
      const m = minutes % 60;
      if (m === 0) return h + (h === 1 ? " hora" : " horas");
      return h + (h === 1 ? " hora e " : " horas e ") + m + (m === 1 ? " minuto" : " minutos");
    }

    function paged(list, page) {
      return list.slice(page * pageSize, page * pageSize + pageSize);
    }

    function renderPool() {
      const pages = Math.max(1, Math.ceil(baseBlocks.length / pageSize));
      state.poolPage = Math.max(0, Math.min(state.poolPage, pages - 1));
      el.poolPage.textContent = (state.poolPage + 1) + " / " + pages;
      el.poolCounter.textContent = baseBlocks.length;
      el.poolRows.innerHTML = "";
      paged(baseBlocks, state.poolPage).forEach((block) => {
        const card = document.createElement("button");
        card.className = "card";
        card.style.border = "0";
        card.style.background = "#f7f9fd";
        card.innerHTML = "<h4>" + block.name + "</h4><p>toque para definir minutos</p><span class='bar' style='background:" + block.gradient + "'></span>";
        card.onclick = () => openMinute(block);
        el.poolRows.appendChild(card);
      });
      el.poolLine.innerHTML = "";
      for (let i = 0; i < 6; i++) {
        const seg = document.createElement("div");
        seg.className = "seg";
        seg.style.flex = "1";
        seg.style.background = gradients[(state.poolPage * 6 + i) % gradients.length];
        el.poolLine.appendChild(seg);
      }
    }

    function renderSelected() {
      const pages = Math.max(1, Math.ceil(state.selected.length / pageSize));
      state.selectedPage = Math.max(0, Math.min(state.selectedPage, pages - 1));
      el.selPage.textContent = (state.selectedPage + 1) + " / " + pages;
      el.selectedRows.innerHTML = "";
      const chunk = paged(state.selected, state.selectedPage);
      for (let i = 0; i < 6; i++) {
        if (!chunk[i]) {
          const empty = document.createElement("div");
          empty.className = "card";
          empty.style.background = "#fafbfd";
          empty.innerHTML = "<h4 style='color:#9aa3b5'>vazio</h4>";
          el.selectedRows.appendChild(empty);
          continue;
        }
        const item = chunk[i];
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = "<h4>" + item.name + "</h4><p>" + toHoursText(item.minutes) + "</p><span class='bar' style='background:" + item.gradient + "'></span>";
        el.selectedRows.appendChild(card);
      }
      const total = state.selected.reduce((s, item) => s + item.minutes, 0);
      el.totalMinutes.textContent = String(total);
      el.totalLabel.textContent = toHoursText(total) + " total";
      el.timeline.innerHTML = "";
      const safeTotal = Math.max(total, 1);
      state.selected.forEach((item) => {
        const seg = document.createElement("div");
        seg.className = "seg";
        seg.style.height = (item.minutes / safeTotal) * 100 + "%";
        seg.style.background = item.gradient;
        el.timeline.appendChild(seg);
      });
      if (!state.selected.length) {
        const seg = document.createElement("div");
        seg.className = "seg";
        seg.style.flex = "1";
        seg.style.background = "#dfe6f2";
        el.timeline.appendChild(seg);
      }
    }

    function openMinute(block) {
      state.currentPick = block;
      state.currentMinutes = 5;
      el.stepName.textContent = block.name;
      renderMinute();
      el.minuteModal.classList.add("show");
    }

    function renderMinute() {
      el.minuteValue.textContent = String(state.currentMinutes);
      el.minuteLabel.textContent = toHoursText(state.currentMinutes);
    }

    function closeMinute() {
      el.minuteModal.classList.remove("show");
    }

    document.getElementById("openAulas").onclick = () => {
      el.aulasModal.classList.add("show");
      renderSelected();
    };
    document.getElementById("closeAulas").onclick = () => el.aulasModal.classList.remove("show");
    document.getElementById("openSelector").onclick = () => {
      el.selectorModal.classList.add("show");
      renderPool();
    };
    document.getElementById("closeSelector").onclick = () => el.selectorModal.classList.remove("show");

    document.getElementById("poolPrev").onclick = () => { state.poolPage--; renderPool(); };
    document.getElementById("poolNext").onclick = () => { state.poolPage++; renderPool(); };
    document.getElementById("selPrev").onclick = () => { state.selectedPage--; renderSelected(); };
    document.getElementById("selNext").onclick = () => { state.selectedPage++; renderSelected(); };

    document.getElementById("minDown").onclick = () => {
      state.currentMinutes = Math.max(1, state.currentMinutes - 1);
      renderMinute();
    };
    document.getElementById("minUp").onclick = () => {
      state.currentMinutes = Math.min(300, state.currentMinutes + 1);
      renderMinute();
    };
    document.getElementById("cancelMinute").onclick = closeMinute;
    document.getElementById("applyMinute").onclick = () => {
      if (!state.currentPick) return;
      state.selected.push({ ...state.currentPick, minutes: state.currentMinutes });
      closeMinute();
      renderSelected();
    };
  </script>
</body>
</html>
