<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini</title>
  <style>
    :root {
      color-scheme: only light;
      --text: #1a1a1a;
      --border: #eceff4;
      --g-red: linear-gradient(145deg, #ff8a47, #f8d94a);
      --g-blue: linear-gradient(145deg, #6bc6ff, #3a69f5);
      --g-purple: linear-gradient(145deg, #b762ff, #6b59f4);
      --g-gold: linear-gradient(145deg, #ffd44d, #ffb300);
      --g-navy: linear-gradient(145deg, #2f58d8, #17205f);
      --g-ok: linear-gradient(145deg, #56d26f, #1f9f52);
      --g-danger: linear-gradient(145deg, #ff8a6b, #ec4c3a);
      --g-edit: linear-gradient(145deg, #67c9ff, #3862fa);
      --g-star: linear-gradient(145deg, #b56bff, #7d3ef2);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; font-family: "Trebuchet MS", "Segoe UI", sans-serif; color: var(--text); background: #fff; }
    .app { min-height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px; padding: 18px 16px 26px; }
    .mini-logo { width: min(88vw, 460px); max-height: 35vh; object-fit: contain; }
    .actions-5 { width: min(88vw, 460px); display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
    .icon-chip { border: 0; background: transparent; display: flex; flex-direction: column; align-items: center; gap: 6px; color: #30333c; font-size: 12px; }
    .icon-ball { width: 54px; height: 54px; border-radius: 17px; display: grid; place-items: center; box-shadow: 0 10px 18px rgba(0, 0, 0, .12); }
    .icon-ball svg { width: 28px; height: 28px; fill: #fff; }
    .g-red { background: var(--g-red); } .g-blue { background: var(--g-blue); } .g-purple { background: var(--g-purple); } .g-gold { background: var(--g-gold); } .g-navy { background: var(--g-navy); }

    .immersive { position: fixed; inset: 0; background: #fff; z-index: 20; transform: translateY(100%); opacity: 0; pointer-events: none; transition: transform .26s ease, opacity .2s ease; display: grid; grid-template-rows: auto 60vh auto 10vh; padding: 14px 12px 8px; }
    .immersive.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
    .modal-head { text-align: center; }
    .modal-head h2 { margin: 0; font-size: 20px; }
    .deck { border-radius: 22px; border: 1px solid var(--border); padding: 12px 10px; display: grid; grid-template-columns: 1fr 40px; gap: 10px; overflow: hidden; }
    .rows { display: grid; grid-template-rows: repeat(6, 1fr); gap: 8px; min-height: 0; }
    .card { min-height: 8vh; border-radius: 14px; padding: 8px 10px; color: #fff; position: relative; overflow: hidden; display: grid; align-content: center; }
    .card.with-icon {
      grid-template-columns: 54px 1fr 54px;
      align-items: center;
      gap: 8px;
    }
    .card-icon-lg {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      object-fit: cover;
      background: rgba(255,255,255,.2);
      border: 1px solid rgba(255,255,255,.25);
    }
    .card-center { min-width: 0; }
    .card h4 { margin: 0; font-size: 17px; line-height: 1.08; }
    .card p { margin: 4px 0 0; font-size: 13px; opacity: .95; }
    .card .side-actions { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); display: flex; gap: 6px; }
    .mini-ic { width: 26px; height: 26px; border-radius: 8px; border: 0; background: rgba(255,255,255,.22); backdrop-filter: blur(2px); display: grid; place-items: center; cursor: pointer; }
    .mini-ic svg { width: 16px; height: 16px; fill: #fff; }
    .timeline { border-radius: 12px; background: #f2f5fb; padding: 4px; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
    .timeline .seg { width: 100%; border-radius: 8px; }
    .pager { margin-top: 6px; display: flex; justify-content: center; align-items: center; gap: 12px; font-size: 13px; color: #4e5568; }
    .pill-btn { border: 0; border-radius: 999px; width: 34px; height: 34px; background: #eef3fa; cursor: pointer; }
    .total-time { display: grid; place-items: center; padding-top: 4px; }
    .total-time small { font-size: 18px; font-weight: 700; color: #3d455b; }

    .footer-actions { display: flex; justify-content: center; gap: 8px; align-items: center; }
    .round-action { border: 0; width: 54px; height: 54px; border-radius: 50%; color: #fff; display: grid; place-items: center; box-shadow: 0 10px 20px rgba(0,0,0,.14); cursor: pointer; }
    .round-action svg { width: 26px; height: 26px; fill: #fff; }
    .plus { background: var(--g-ok); } .close { background: var(--g-danger); } .edit { background: var(--g-edit); } .star { background: var(--g-star); }

    .step-modal, .ai-modal { position: fixed; inset: 0; z-index: 35; transform: scale(.96); opacity: 0; pointer-events: none; transition: .18s ease; }
    .step-modal.show, .ai-modal.show { transform: scale(1); opacity: 1; pointer-events: auto; }
    .step-modal { background: #fff; display: grid; grid-template-rows: auto 1fr auto; padding: 20px 14px 14px; }
    .step-title { text-align: center; font-size: 18px; font-weight: 700; }
    .minute-pick { display: grid; place-items: center; gap: 8px; }
    .pick-row { display: flex; align-items: center; gap: 14px; }
    .arrow { border: 0; width: 56px; height: 56px; border-radius: 16px; background: #edf2fa; font-size: 32px; cursor: pointer; }
    #minuteValue { min-width: 100px; text-align: center; font-size: 64px; font-weight: 800; }
    #minuteLabel { color: #596178; font-size: 13px; }
    .step-actions { display: flex; gap: 10px; }
    .step-actions button { flex: 1; border: 0; border-radius: 14px; height: 50px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }
    .btn-cancel { background: #ff7360; } .btn-apply { background: #26b35e; }

    .ai-modal { background: linear-gradient(160deg, #6f39e5, #9a57f6 55%, #5f2ccd); color: #fff; padding: 18px 14px 12px; display: grid; grid-template-rows: auto auto auto 1fr auto; gap: 10px; }
    .ai-modal h1 { margin: 0; font-size: 26px; line-height: 1.1; }
    .ai-modal .hint { font-size: 13px; opacity: .95; }
    .ai-input { width: 100%; border: 0; border-radius: 14px; padding: 14px; font-size: 15px; min-height: 76px; resize: none; color: #2d1f55; }
    .examples { font-size: 13px; min-height: 20px; opacity: .94; }
    .ai-output { background: rgba(255,255,255,.14); border-radius: 16px; padding: 12px; overflow-y: auto; }
    .ai-block { border-radius: 12px; padding: 10px; margin-bottom: 8px; background: rgba(255,255,255,.12); }
    .ai-head {
      display: grid;
      grid-template-columns: 30px 1fr 30px;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .ai-icon-sm {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,.3);
      background: rgba(255,255,255,.2);
    }
    .ai-block h3 { margin: 0 0 4px; font-size: 17px; }
    .ai-block p { margin: 0; font-size: 13px; line-height: 1.4; }
    .ai-actions { display: flex; gap: 8px; }
    .ai-actions button { flex: 1; border: 0; border-radius: 12px; height: 46px; color: #fff; font-weight: 700; cursor: pointer; }
    .ai-secondary { background: rgba(255,255,255,.24); } .ai-primary { background: #3ad878; }
  </style>
</head>
<body>
  <main class="app">
    <img class="mini-logo" src="/mini/mini.png" alt="Mini" />
    <section class="actions-5">
      <button class="icon-chip" type="button"><span class="icon-ball g-red"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7zM4 5h2v14H4z"/></svg></span><span>Midia</span></button>
      <button class="icon-chip" type="button"><span class="icon-ball g-blue"><svg viewBox="0 0 24 24"><path d="M12 3 1 9l11 6 9-4.91V17h2V9L12 3zm0 13L5 12.18v3.27L12 19l7-3.55v-3.27L12 16z"/></svg></span><span>Cursos</span></button>
      <button class="icon-chip" type="button"><span class="icon-ball g-purple"><svg viewBox="0 0 24 24"><path d="M4 4h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H8l-5 4v-4H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg></span><span>Criar</span></button>
      <button id="openAulas" class="icon-chip" type="button"><span class="icon-ball g-gold"><svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zM8 7h8v2H8V7zm0 4h8v2H8v-2zm0 4h5v2H8v-2z"/></svg></span><span>Aulas</span></button>
      <button class="icon-chip" type="button"><span class="icon-ball g-navy"><svg viewBox="0 0 24 24"><path d="M4 13h6v7H4zm10-9h6l-1 6h-4v4l-5 3V7z"/></svg></span><span>Liderar</span></button>
    </section>
  </main>

  <section id="aulasModal" class="immersive">
    <header class="modal-head"><h2>Cronograma de Aulas</h2></header>
    <div class="deck"><div><div id="selectedRows" class="rows"></div><div class="pager"><button id="selPrev" class="pill-btn">&#8249;</button><span id="selPage">1 / 1</span><button id="selNext" class="pill-btn">&#8250;</button></div></div><div id="timeline" class="timeline"></div></div>
    <div class="total-time"><small id="totalLabel">0 minutos total</small></div>
    <footer class="footer-actions">
      <button id="closeAulas" class="round-action close" type="button"><svg viewBox="0 0 24 24"><path d="M18.3 5.71 12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.29 19.7 2.88 18.3 9.17 12 2.88 5.71 4.29 4.29l6.3 6.3 6.29-6.3z"/></svg></button>
      <button id="openSelector" class="round-action plus" type="button"><svg viewBox="0 0 24 24"><path d="M19 11H13V5h-2v6H5v2h6v6h2v-6h6z"/></svg></button>
      <button class="round-action edit" type="button"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75l11-11.03-3.75-3.75L3 17.25zm17.71-10.04a1.003 1.003 0 0 0 0-1.42l-2.5-2.5a1.003 1.003 0 0 0-1.42 0l-1.83 1.83 3.75 3.75 2-1.66z"/></svg></button>
      <button id="openAi" class="round-action star" type="button"><svg viewBox="0 0 24 24"><path d="m12 17.27 6.18 3.73-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg></button>
    </footer>
  </section>

  <section id="selectorModal" class="immersive">
    <header class="modal-head"><h2>Selecionar Blocos</h2></header>
    <div class="deck"><div><div id="poolRows" class="rows"></div><div class="pager"><button id="poolPrev" class="pill-btn">&#8249;</button><span id="poolPage">1 / 1</span><button id="poolNext" class="pill-btn">&#8250;</button></div></div><div id="poolLine" class="timeline"></div></div>
    <div class="total-time"><small><span id="poolCounter">48</span> blocos disponiveis</small></div>
    <footer class="footer-actions"><button id="closeSelector" class="round-action close" type="button"><svg viewBox="0 0 24 24"><path d="M18.3 5.71 12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.29 19.7 2.88 18.3 9.17 12 2.88 5.71 4.29 4.29l6.3 6.3 6.29-6.3z"/></svg></button></footer>
  </section>

  <section id="minuteModal" class="step-modal">
    <div class="step-title" id="stepName">Definir tempo</div>
    <div class="minute-pick"><div class="pick-row"><button id="minDown" class="arrow">&#8249;</button><div id="minuteValue">5</div><button id="minUp" class="arrow">&#8250;</button></div><div id="minuteLabel">5 minutos</div></div>
    <div class="step-actions"><button id="cancelMinute" class="btn-cancel" type="button">Cancelar</button><button id="applyMinute" class="btn-apply" type="button">Adicionar</button></div>
  </section>

  <section id="aiModal" class="ai-modal">
    <h1>O que vamos ensinar<br>nessa aula?</h1>
    <div class="hint">Plano amigavel cristao com blocos prontos (modelo 4.1 instant).</div>
    <textarea id="aiPrompt" class="ai-input" placeholder="Quero ensinar perdão com a história de José"></textarea>
    <div id="aiExamples" class="examples"></div>
    <div id="aiOutput" class="ai-output"></div>
    <div class="ai-actions"><button id="closeAi" class="ai-secondary" type="button">Fechar</button><button id="generateAi" class="ai-primary" type="button">Gerar Plano</button></div>
  </section>

  <script>
    const gradients = ["linear-gradient(145deg,#ff9a5c,#f5d74f)","linear-gradient(145deg,#ffa874,#ff8052)","linear-gradient(145deg,#ffda5a,#ffb84d)","linear-gradient(145deg,#ffd94f,#ffb100)","linear-gradient(145deg,#ff8b79,#ff5f4a)","linear-gradient(145deg,#d183ff,#8f67ff)","linear-gradient(145deg,#70cbff,#4f8aff)","linear-gradient(145deg,#5e72ff,#3751df)"];
    const names = ["Check-in","Entrega de cracha","Boas-vindas","Chamada","Quebra-gelo","Abertura","Hino oficial","Oracao inicial","Louvor","Louvor com gestos","Versiculo do dia","Memorizacao biblica","Introducao do tema","Historia com tema","Historia biblica","Mensagem","Aplicacao pratica","Oracao apos mensagem","Pedidos de oracao","Teatro","Fantoches","Encenacao rapida","Ilustracao visual","Video curto","Desenho ou filme","Explicar dinamica","Dinamica","Explicar jogo","Jogo","Desafio","Atividade impressa","Atividade manual","Atividade em grupo","Perguntas e respostas","Quiz biblico","Revisao da aula","Fazer em casa","Explicar projeto","Projeto em andamento","Ensaio","Apresentacao","Aniversarios","Momento oferta","Oracao da oferta","Lanche","Hora da foto","Oracao final","Check-out"];
    const baseBlocks = names.map((n, i) => ({ id: i + 1, name: n, gradient: gradients[i % gradients.length] }));
    const state = { selected: [], poolPage: 0, selectedPage: 0, currentPick: null, currentMinutes: 5 };
    const examples = ["Quero ensinar perdão com a história de José","Quero ensinar como obedecer com a história de Jonas","Quero ensinar a ouvir a voz de Deus com Samuel"];
    let exIndex = 0;

    const $ = (id) => document.getElementById(id);
    const pageSize = 6;
    const iconBase = "https://pub-3f5e3a74474b4527bc44ecf90f75585a.r2.dev/%C3%ADcones/";

    function iconUrlById(id) {
      const safe = Math.max(1, Math.min(48, Number(id) || 1));
      return `${iconBase}${String(safe).padStart(2, "0")}.png`;
    }

    function iconUrlByName(name) {
      const idx = baseBlocks.findIndex((b) => b.name === name);
      return iconUrlById((idx >= 0 ? idx + 1 : 1));
    }

    function toHoursText(m){ if(m<60)return m+" minutos"; const h=Math.floor(m/60),r=m%60; return r?`${h} horas e ${r} minutos`:`${h} horas`; }
    function page(list, idx){ return list.slice(idx*pageSize, idx*pageSize+pageSize); }

    function renderPool(){
      const pages=Math.max(1,Math.ceil(baseBlocks.length/pageSize)); state.poolPage=Math.max(0,Math.min(state.poolPage,pages-1));
      $("poolPage").textContent=`${state.poolPage+1} / ${pages}`; $("poolCounter").textContent=String(baseBlocks.length);
      $("poolRows").innerHTML=""; page(baseBlocks,state.poolPage).forEach((b)=>{ const c=document.createElement("button"); c.className="card with-icon"; c.style.border="0"; c.style.background=b.gradient; const icon=iconUrlById(b.id); c.innerHTML=`<img class='card-icon-lg' src='${icon}' alt='${b.name}'><div class='card-center'><h4>${b.name}</h4></div><img class='card-icon-lg' src='${icon}' alt='${b.name}'>`; c.onclick=()=>openMinute(b); $("poolRows").appendChild(c); });
      $("poolLine").innerHTML=""; for(let i=0;i<6;i++){ const s=document.createElement("div"); s.className="seg"; s.style.flex="1"; s.style.background="#e9eef9"; $("poolLine").appendChild(s);}    }

    function renderSelected(){
      const pages=Math.max(1,Math.ceil(state.selected.length/pageSize)); state.selectedPage=Math.max(0,Math.min(state.selectedPage,pages-1));
      $("selPage").textContent=`${state.selectedPage+1} / ${pages}`; $("selectedRows").innerHTML="";
      page(state.selected,state.selectedPage).forEach((it,localIdx)=>{ const c=document.createElement("div"); c.className="card with-icon"; c.style.background=it.gradient; const icon=iconUrlById(it.id); c.innerHTML=`<img class='card-icon-lg' src='${icon}' alt='${it.name}'><div class='card-center'><h4>${it.name}</h4><p>${toHoursText(it.minutes)}</p></div><img class='card-icon-lg' src='${icon}' alt='${it.name}'><div class='side-actions'><button class='mini-ic' data-edit='${it.uid}'><svg viewBox='0 0 24 24'><path d='M3 17.25V21h3.75l11-11.03-3.75-3.75L3 17.25zm17.71-10.04a1.003 1.003 0 0 0 0-1.42l-2.5-2.5a1.003 1.003 0 0 0-1.42 0l-1.83 1.83 3.75 3.75 2-1.66z'/></svg></button><button class='mini-ic' data-del='${it.uid}'><svg viewBox='0 0 24 24'><path d='M6 7h12l-1 13H7L6 7zm3-3h6l1 2H8l1-2z'/></svg></button></div>`; $("selectedRows").appendChild(c); });
      const total=state.selected.reduce((s,i)=>s+i.minutes,0); $("totalLabel").textContent=`${toHoursText(total)} total`;
      $("timeline").innerHTML=""; const safe=Math.max(total,1); state.selected.forEach((i)=>{const seg=document.createElement("div"); seg.className="seg"; seg.style.height=(i.minutes/safe*100)+"%"; seg.style.background=i.gradient; $("timeline").appendChild(seg);});
      $("selectedRows").querySelectorAll("[data-del]").forEach((b)=>b.onclick=()=>{ state.selected=state.selected.filter(x=>String(x.uid)!==b.dataset.del); renderSelected(); });
      $("selectedRows").querySelectorAll("[data-edit]").forEach((b)=>b.onclick=()=>{ const item=state.selected.find(x=>String(x.uid)===b.dataset.edit); if(!item)return; const n=prompt("Novo nome para essa atividade (somente sua lista):", item.name); if(n&&n.trim()){ item.name=n.trim(); renderSelected(); } });
    }

    function openMinute(block){ state.currentPick=block; state.currentMinutes=5; $("stepName").textContent=block.name; renderMinute(); $("minuteModal").classList.add("show"); }
    function renderMinute(){ $("minuteValue").textContent=String(state.currentMinutes); $("minuteLabel").textContent=toHoursText(state.currentMinutes); }

    $("openAulas").onclick=()=>{ $("aulasModal").classList.add("show"); renderSelected(); };
    $("closeAulas").onclick=()=>$("aulasModal").classList.remove("show");
    $("openSelector").onclick=()=>{ $("selectorModal").classList.add("show"); renderPool(); };
    $("closeSelector").onclick=()=>$("selectorModal").classList.remove("show");
    $("poolPrev").onclick=()=>{state.poolPage--;renderPool();}; $("poolNext").onclick=()=>{state.poolPage++;renderPool();};
    $("selPrev").onclick=()=>{state.selectedPage--;renderSelected();}; $("selNext").onclick=()=>{state.selectedPage++;renderSelected();};
    $("minDown").onclick=()=>{state.currentMinutes=Math.max(1,state.currentMinutes-1);renderMinute();}; $("minUp").onclick=()=>{state.currentMinutes=Math.min(300,state.currentMinutes+1);renderMinute();};
    $("cancelMinute").onclick=()=>$("minuteModal").classList.remove("show");
    $("applyMinute").onclick=()=>{ if(!state.currentPick) return; state.selected.push({...state.currentPick, minutes: state.currentMinutes, uid: Date.now()+Math.random()}); $("minuteModal").classList.remove("show"); renderSelected(); };

    function setExample(){ $("aiExamples").textContent = examples[exIndex % examples.length]; exIndex += 1; }
    setExample(); setInterval(setExample, 1200);

    $("openAi").onclick=()=>{ $("aiModal").classList.add("show"); if(!$("aiPrompt").value) $("aiPrompt").value=examples[0]; };
    $("closeAi").onclick=()=>$("aiModal").classList.remove("show");

    async function streamMiniPlan(prompt) {
      const out = $("aiOutput");
      const response = await fetch("/api/mini/aulas/gerar", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "text/event-stream"
        },
        body: JSON.stringify({
          theme: prompt,
          selectedBlocks: state.selected.map((item) => ({ name: item.name, minutes: item.minutes })),
          model: "gpt-4.1-instant"
        })
      });

      if (!response.ok || !response.body) {
        const text = await response.text();
        throw new Error(text || "Falha ao gerar plano.");
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const events = buffer.split("\n\n");
        buffer = events.pop() || "";

        for (const evt of events) {
          const lines = evt.split("\n");
          let eventName = "message";
          let dataText = "";
          for (const line of lines) {
            if (line.startsWith("event:")) eventName = line.slice(6).trim();
            if (line.startsWith("data:")) dataText += line.slice(5).trim();
          }
          if (!dataText) continue;
          let data;
          try { data = JSON.parse(dataText); } catch { continue; }

          if (eventName === "section") {
            const idx = out.querySelectorAll(".ai-block").length;
            const b = document.createElement("article");
            b.className = "ai-block";
            b.style.background = gradients[idx % gradients.length];
            const blockRef = data.blockName || data.title || "Bloco";
            const icon = iconUrlByName(blockRef);
            b.innerHTML = `<div class='ai-head'><img class='ai-icon-sm' src='${icon}' alt='${blockRef}'><h3>${data.title || data.blockName || "Bloco"}</h3><img class='ai-icon-sm' src='${icon}' alt='${blockRef}'></div><p>${data.content || ""}</p>`;
            out.appendChild(b);
            out.scrollTop = out.scrollHeight;
          }

          if (eventName === "error") {
            throw new Error(data?.message || "Erro ao gerar plano.");
          }
        }
      }
    }

    $("generateAi").onclick = async () => {
      const prompt = $("aiPrompt").value.trim();
      const out = $("aiOutput");
      out.innerHTML = "";
      const loading = document.createElement("article");
      loading.className = "ai-block";
      loading.innerHTML = "<h3>Gerando...</h3><p>Montando blocos do plano em tempo real.</p>";
      out.appendChild(loading);
      try {
        await streamMiniPlan(prompt);
        loading.remove();
      } catch (error) {
        loading.innerHTML = `<h3>Falha</h3><p>${error instanceof Error ? error.message : "Erro desconhecido."}</p>`;
      }
    };
  </script>
</body>
</html>
