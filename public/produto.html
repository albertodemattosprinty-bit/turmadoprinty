<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turma do Printy | Album</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="produto">
  <header class="site-header">
    <a class="brand" href="/index.html"><span class="brand-mark">P</span><span class="brand-text">Turma do Printy</span></a>
  </header>

  <main class="page-shell">
    <section class="product-shell">
      <div class="product-overview section-card">
        <a class="inline-link" href="/produtos.html">Voltar para produtos</a>
        <div class="product-hero">
          <img id="product-cover" class="product-cover" alt="Capa do album">
          <div class="product-summary">
            <h1 id="product-title" class="section-title">Carregando album...</h1>
            <div id="album-admin-panel" class="album-admin-panel" hidden>
              <label>Preco deste album (centavos)
                <input id="album-price-input" type="number" min="0" step="1">
              </label>
              <button id="album-save-button" class="primary-button" type="button">Salvar album</button>
              <p id="album-admin-status" class="section-muted"></p>
            </div>
            <div class="product-meta">
              <span id="product-price" class="status-pill"></span>
            </div>
            <div class="hero-actions">
              <button id="buy-album-button" class="ghost-button buy-album-button" type="button" aria-label="Comprar album">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4h-2l-1 2H1v2h2l2.4 8.1A2 2 0 0 0 6.3 18H17a2 2 0 0 0 1.9-1.4L21 8H7.4l-.5-2zM9 20a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/></svg>
                <span>Comprar</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <section class="section-card">
        <div class="section-head">
          <div>
            <p class="eyebrow">Faixas</p>
            <h2 class="section-title small">Ouça todas as músicas</h2>
          </div>
        </div>
        <div id="track-list" class="track-list"></div>
      </section>
    </section>
  </main>

  <nav class="site-footer-nav site-nav" aria-label="Navegacao principal">
    <a class="nav-link" href="/index.html"><svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5v8a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg><span>Home</span></a>
    <a class="nav-link" href="/produtos.html"><svg viewBox="0 0 24 24"><path d="M4 7h16v12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1zm3-4h10l1 3H6z"/></svg><span>Produtos</span></a>
    <a class="nav-link" href="/planos.html"><svg viewBox="0 0 24 24"><path d="M12 2 3 7v6c0 5 3.8 9.7 9 11 5.2-1.3 9-6 9-11V7zm0 4 5 2.7v4.1c0 3.6-2.4 7-5 8-2.6-1-5-4.4-5-8V8.7z"/></svg><span>Planos</span></a>
    <a class="nav-link" href="/eventos.html"><svg viewBox="0 0 24 24"><path d="m8 5 11 7-11 7z"/></svg><span>Eventos</span></a>
    <a class="nav-link" href="/explorar.html"><svg viewBox="0 0 24 24"><path d="m14 4 1.2 3.3L18.5 8.5l-3.3 1.2L14 13l-1.2-3.3L9.5 8.5l3.3-1.2zm-7 9 1 2.7L10.7 17 8 18l-1 2.7L6 18l-2.7-1.3L6 15.7zm10 2 1 2.4 2.4 1-2.4 1-1 2.4-1-2.4-2.4-1 2.4-1z"/></svg><span>Explorar</span></a>
  </nav>

  <script type="module" src="/produto.js"></script>
</body>
</html>
