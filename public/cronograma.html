<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turma do Printy | Cronograma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="cronograma">
  <header class="site-header">
    <a class="brand" href="/index.html">
      <span class="brand-mark">P</span>
      <span class="brand-text">Turma do Printy</span>
    </a>
  </header>

  <main class="page-shell cronograma-shell">
    <section class="cronograma-hero">
      <div class="cronograma-hero-copy">
        <p class="eyebrow">Planejamento</p>
        <h1 class="section-title">Cronograma da aula</h1>
        <p class="section-muted">Monte sua sequência de aula com blocos proporcionais ao tempo total.</p>
      </div>
    </section>

    <section id="cronograma-step-1" class="cronograma-step">
      <div class="cronograma-step-head">
        <h1 class="section-title">Quanto tempo vai ter a sua aula?</h1>
        <p id="cronograma-time-display" class="cronograma-time-display">Uma hora</p>
      </div>

      <form id="cronograma-duration-form" class="cronograma-duration-form">
        <div class="cronograma-time-picker" aria-label="Definir tempo da aula">
          <button id="cronograma-decrease-time" type="button" class="ghost-button cronograma-icon-button" aria-label="Diminuir 5 minutos">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m14.7 5.3-1.4-1.4L5.2 12l8.1 8.1 1.4-1.4L9 12.99z"/></svg>
          </button>
          <input id="cronograma-total-minutes" type="hidden" value="60">
          <button id="cronograma-increase-time" type="button" class="ghost-button cronograma-icon-button" aria-label="Aumentar 5 minutos">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9.3 18.7 1.4 1.4 8.1-8.1-8.1-8.1-1.4 1.4 5.7 5.7z"/></svg>
          </button>
        </div>
        <div class="cronograma-duration-actions">
          <p id="cronograma-duration-status" class="section-muted" aria-live="polite"></p>
          <div class="cronograma-duration-buttons">
            <button type="submit" class="primary-button">Definir aula</button>
          </div>
        </div>
      </form>
    </section>

    <section id="cronograma-step-2" class="section-card cronograma-board" hidden>
      <div class="cronograma-step-head">
        <h2 class="section-title small">Sua aula está pronta</h2>
        <p id="cronograma-board-summary" class="section-muted"></p>
      </div>

      <div class="cronograma-toolbar">
        <div class="cronograma-toolbar-left">
          <button id="cronograma-add-button" type="button" class="primary-button">Adicionar</button>
          <button id="cronograma-delete-button" type="button" class="ghost-button" disabled>Apagar</button>
          <button id="cronograma-reset-button" type="button" class="ghost-button">Começar nova aula</button>
          <button id="cronograma-start-button" type="button" class="primary-button">Iniciar aula</button>
        </div>
        <div class="cronograma-toolbar-right">
          <button id="cronograma-move-left-button" type="button" class="ghost-button cronograma-icon-button" disabled aria-label="Mover para a esquerda">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m14.7 5.3-1.4-1.4L5.2 12l8.1 8.1 1.4-1.4L9 12.99z"/></svg>
          </button>
          <button id="cronograma-move-right-button" type="button" class="ghost-button cronograma-icon-button" disabled aria-label="Mover para a direita">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9.3 18.7 1.4 1.4 8.1-8.1-8.1-8.1-1.4 1.4 5.7 5.7z"/></svg>
          </button>
        </div>
      </div>

      <div class="cronograma-metrics">
        <span id="cronograma-remaining-time" class="cronograma-pill"></span>
      </div>
    </section>

    <section id="cronograma-add-panel" class="section-card cronograma-add-panel" hidden>
      <div class="cronograma-panel-head">
        <div>
          <p class="eyebrow">Adicionar bloco</p>
          <h3 class="section-title small">Escolha a etapa e os minutos</h3>
        </div>
        <button id="cronograma-close-add-panel" type="button" class="ghost-button cronograma-icon-button" aria-label="Fechar painel de adicionar">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6.4 5 5.6 5.6L17.6 5 19 6.4 13.4 12 19 17.6 17.6 19 12 13.4 6.4 19 5 17.6 10.6 12 5 6.4z"/></svg>
        </button>
      </div>

      <div id="cronograma-options-grid" class="cronograma-options-grid"></div>

      <form id="cronograma-add-form" class="cronograma-add-form">
        <div class="cronograma-add-form-grid">
          <label>
            Etapa escolhida
            <input id="cronograma-selected-type" type="text" readonly placeholder="Toque em uma etapa acima">
          </label>
          <label>
            Quantos minutos?
            <input id="cronograma-block-minutes" type="number" min="1" max="180" step="1" placeholder="Ex.: 10" required>
          </label>
        </div>
        <div class="cronograma-duration-actions">
          <p id="cronograma-add-status" class="section-muted" aria-live="polite"></p>
          <button type="submit" class="primary-button">Adicionar bloco</button>
        </div>
      </form>
    </section>
  </main>

  <nav class="site-footer-nav site-nav" aria-label="Navegação principal">
    <a class="nav-link" href="/index.html"><svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5v8a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg><span>Home</span></a>
    <a class="nav-link" href="/produtos.html"><svg viewBox="0 0 24 24"><path d="M4 7h16v12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1zm3-4h10l1 3H6z"/></svg><span>Produtos</span></a>
    <a class="nav-link" href="/planos.html"><svg viewBox="0 0 24 24"><path d="M12 2 3 7v6c0 5 3.8 9.7 9 11 5.2-1.3 9-6 9-11V7zm0 4 5 2.7v4.1c0 3.6-2.4 7-5 8-2.6-1-5-4.4-5-8V8.7z"/></svg><span>Planos</span></a>
    <a class="nav-link" href="/eventos.html"><svg viewBox="0 0 24 24"><path d="m8 5 11 7-11 7z"/></svg><span>Eventos</span></a>
    <a class="nav-link" href="/explorar.html"><svg viewBox="0 0 24 24"><path d="m14 4 1.2 3.3L18.5 8.5l-3.3 1.2L14 13l-1.2-3.3L9.5 8.5l3.3-1.2zm-7 9 1 2.7L10.7 17 8 18l-1 2.7L6 18l-2.7-1.3L6 15.7zm10 2 1 2.4 2.4 1-2.4 1-1 2.4-1-2.4-2.4-1 2.4-1z"/></svg><span>Explorar</span></a>
  </nav>

  <div id="cronograma-selected-panel-wrap" class="cronograma-selected-panel-wrap" hidden>
    <div id="cronograma-selected-panel" class="cronograma-selected-panel"></div>
  </div>

  <div id="cronograma-fixed-bar-wrap" class="cronograma-fixed-bar-wrap" aria-label="Barra fixa da aula" hidden>
    <div id="cronograma-timeline" class="cronograma-timeline" aria-label="Barra do cronograma"></div>
  </div>

  <script type="module" src="/cronograma.js"></script>
</body>
</html>
