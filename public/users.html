<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turma do Printy | Usuarios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="users">
  <header class="site-header">
    <a class="brand" href="/index.html"><span class="brand-mark">P</span><span class="brand-text">Turma do Printy</span></a>
  </header>

  <main class="page-shell users-page-shell">
    <section class="section-card users-admin-shell">
      <div class="section-head">
        <div>
          <p class="eyebrow">Admin RoseMattos</p>
          <h1 class="section-title small">Usuarios do site</h1>
          <p id="users-status" class="section-muted">Carregando usuarios...</p>
        </div>
      </div>

      <div class="users-table-shell">
        <div class="users-table-head users-table-row">
          <span>Nome do usuario</span>
          <span>Consumo texto OpenAI</span>
          <span>Consumo narracao OpenAI</span>
        </div>
        <div id="users-table-body" class="users-table-body"></div>
      </div>

      <section id="user-detail-panel" class="user-detail-panel" hidden>
        <div class="user-detail-head">
          <div>
            <p class="eyebrow">Usuario selecionado</p>
            <h2 id="user-detail-title" class="section-title small"></h2>
            <p id="user-detail-subtitle" class="section-muted"></p>
          </div>
        </div>

        <div class="user-detail-grid">
          <label>
            Plano manual
            <select id="user-plan-select"></select>
          </label>

          <label>
            Modo da conta
            <select id="user-contractor-select">
              <option value="false">Usuario comum</option>
              <option value="true">Contratante</option>
            </select>
          </label>

          <label id="user-event-label" hidden>
            Evento vinculado
            <select id="user-event-select"></select>
          </label>
        </div>

        <section id="user-message-panel" class="user-message-panel" hidden>
          <div class="user-message-head">
            <div>
              <p class="eyebrow">Mensagem para o usuario</p>
              <h3 class="section-title small">Enviar aviso em destaque</h3>
              <p class="section-muted">Formato: titulo + texto. O texto aceita ate 500 caracteres.</p>
            </div>
          </div>

          <div class="user-message-grid">
            <label>
              Titulo
              <input id="user-message-title" type="text" maxlength="120" placeholder="Ex.: Aviso importante">
            </label>

            <label class="user-message-text-label">
              Texto da mensagem
              <textarea id="user-message-body" maxlength="500" rows="5" placeholder="Digite a mensagem que vai aparecer na tela do usuario"></textarea>
            </label>
          </div>

          <div class="user-message-actions">
            <span id="user-message-counter" class="section-muted">0/500</span>
            <button id="user-message-send-button" class="primary-button" type="button">Enviar mensagem</button>
          </div>
        </section>

        <div class="user-detail-actions">
          <button id="user-save-button" class="primary-button" type="button">Salvar alteracoes</button>
          <button id="user-delete-button" class="ghost-button danger-outline" type="button">Excluir conta</button>
        </div>

        <p id="user-detail-status" class="section-muted"></p>
      </section>
    </section>
  </main>

  <script type="module" src="/users.js"></script>
</body>
</html>
