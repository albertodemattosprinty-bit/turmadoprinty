<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turma do Printy | Explorar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="explorar">
  <main class="page-shell">
    <section id="explore-auth-shell" class="explore-auth-shell section-card">
      <div class="explore-auth-head">
        <h1 class="section-title small" data-text-key="explore.auth.title">Entre para conversar com a IA</h1>
        <p id="auth-status" class="section-muted">Verificando sessao...</p>
      </div>

      <div class="auth-tabs" role="tablist" aria-label="Acesso ao explorar">
        <button class="auth-tab active" type="button" data-auth-tab="login" role="tab" aria-selected="true">Entrar</button>
        <button class="auth-tab" type="button" data-auth-tab="register" role="tab" aria-selected="false">Cadastrar</button>
      </div>

      <div class="auth-panel active" data-auth-panel="login" role="tabpanel">
        <form id="login-form" class="auth-form auth-form-compact">
          <label><input id="login-username" type="text" placeholder="Nome de usuario" aria-label="Nome de usuario"></label>
          <label><input id="login-password" type="password" placeholder="Senha" aria-label="Senha"></label>
          <button type="submit" class="primary-button">Entrar</button>
        </form>
      </div>

      <div class="auth-panel" data-auth-panel="register" role="tabpanel" hidden>
        <form id="register-form" class="auth-form auth-form-compact">
          <label><input id="register-name" type="text" placeholder="Nome" aria-label="Nome"></label>
          <label><input id="register-username" type="text" placeholder="Nome de usuario" aria-label="Nome de usuario"></label>
          <label><input id="register-password" type="password" placeholder="Senha" aria-label="Senha"></label>
          <label><input id="register-password-confirm" type="password" placeholder="Confirmar senha" aria-label="Confirmar senha"></label>
          <button type="submit" class="primary-button">Cadastrar</button>
        </form>
      </div>
    </section>

    <section id="explore-chat-layout" class="chat-layout" hidden>
      <aside class="chat-sidebar">
        <div class="sidebar-topbar">
          <button id="sidebar-toggle-button" class="sidebar-toggle-button" type="button" aria-label="Recolher historico" title="Recolher historico">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6.5A1.5 1.5 0 0 1 5.5 5h13a1.5 1.5 0 1 1 0 3h-13A1.5 1.5 0 0 1 4 6.5m0 5.5a1.5 1.5 0 0 1 1.5-1.5h13a1.5 1.5 0 1 1 0 3h-13A1.5 1.5 0 0 1 4 12m0 5.5A1.5 1.5 0 0 1 5.5 16h13a1.5 1.5 0 1 1 0 3h-13A1.5 1.5 0 0 1 4 17.5"/></svg>
          </button>
        </div>
        <div class="sidebar-card">
          <div class="sidebar-scroll-content">
            <div class="sidebar-header">
            <h2 class="section-title small" data-text-key="explore.sidebar.title">Chats</h2>
            <p class="section-muted" id="chat-auth-status">Verificando sessao...</p>
            <label class="chat-search-field" aria-label="Pesquisar chats">
              <input id="chat-search-input" type="search" placeholder="Pesquisar chats">
            </label>
            <div class="chat-actions sidebar-actions">
              <button id="new-chat-button" class="sidebar-icon-button primary-button" type="button" aria-label="Nova conversa" title="Nova conversa">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4a1.5 1.5 0 0 1 1.5 1.5v5h5a1.5 1.5 0 1 1 0 3h-5v5a1.5 1.5 0 1 1-3 0v-5h-5a1.5 1.5 0 1 1 0-3h5v-5A1.5 1.5 0 0 1 12 4"/></svg>
              </button>
            </div>
            </div>
            <div class="history-scroll-shell">
              <div id="history-list" class="history-list"></div>
            </div>
            <div class="chat-actions sidebar-actions sidebar-actions-bottom">
              <a href="/index.html" id="sidebar-home-link" class="sidebar-icon-button ghost-button" aria-label="Ir para home" title="Ir para home">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5v8a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>
              </a>
              <button id="settings-button" class="sidebar-icon-button ghost-button" type="button" aria-label="Abrir configuracoes" title="Abrir configuracoes">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8.8A3.2 3.2 0 1 0 12 15.2 3.2 3.2 0 0 0 12 8.8m8.2 3.2-.97-.56a7.9 7.9 0 0 0-.33-1.3l.7-.88a1 1 0 0 0-.09-1.32l-1.18-1.18a1 1 0 0 0-1.32-.09l-.88.7a7.9 7.9 0 0 0-1.3-.33l-.56-.97A1 1 0 0 0 13.4 4h-1.8a1 1 0 0 0-.87.5l-.56.97a7.9 7.9 0 0 0-1.3.33l-.88-.7a1 1 0 0 0-1.32.09L5.5 6.37a1 1 0 0 0-.09 1.32l.7.88c-.15.42-.26.86-.33 1.3l-.97.56A1 1 0 0 0 4 11.6v1.8a1 1 0 0 0 .5.87l.97.56c.07.44.18.88.33 1.3l-.7.88a1 1 0 0 0 .09 1.32l1.18 1.18a1 1 0 0 0 1.32.09l.88-.7c.42.15.86.26 1.3.33l.56.97a1 1 0 0 0 .87.5h1.8a1 1 0 0 0 .87-.5l.56-.97c.44-.07.88-.18 1.3-.33l.88.7a1 1 0 0 0 1.32-.09l1.18-1.18a1 1 0 0 0 .09-1.32l-.7-.88c.15-.42.26-.86.33-1.3l.97-.56a1 1 0 0 0 .5-.87v-1.8a1 1 0 0 0-.5-.87"/></svg>
              </button>
              <button id="logout-button" class="sidebar-icon-button ghost-button" type="button" aria-label="Sair da conta" title="Sair da conta">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 4H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h5v-2H5V6h5zm7.59 7L14 7.41 15.41 6 21.83 12l-6.42 6-1.41-1.41L17.59 13H9v-2z"/></svg>
              </button>
            </div>
          </div>
        </div>
      </aside>

      <section class="chat-main">
        <div id="chat-shell" class="conversation-shell">
          <div id="conversation-header" class="conversation-header">
            <div>
              <h2 id="conversation-title" class="conversation-title"></h2>
            </div>
            <div class="conversation-tools">
              <label class="chat-mode-picker" for="chat-mode-select">
                <select id="chat-mode-select" aria-label="Escolher modelo">
                  <option value="fast">Prático</option>
                  <option value="think">Pensativo</option>
                  <option value="project">Projeto</option>
                </select>
              </label>
              <p id="conversation-meta" class="conversation-meta"></p>
            </div>
          </div>
          <div id="chat-thread" class="chat-thread"></div>
          <form id="chat-form" class="chat-composer">
            <div class="composer-input-shell">
              <textarea id="chat-input" placeholder="Digite sua mensagem aqui..." rows="1"></textarea>
              <div class="chat-actions composer-actions">
                <button id="mic-button" type="button" class="icon-button ghost-button" aria-label="Gravar mensagem de voz" title="Gravar mensagem de voz">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 15a3 3 0 0 0 3-3V7a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3m5-3a1 1 0 1 1 2 0 7 7 0 0 1-6 6.93V21h2a1 1 0 1 1 0 2H9a1 1 0 1 1 0-2h2v-2.07A7 7 0 0 1 5 12a1 1 0 1 1 2 0 5 5 0 1 0 10 0"/>
                  </svg>
                </button>
                <button id="stop-button" type="button" class="icon-button primary-button stop-button" aria-label="Parar geracao" title="Parar geracao" disabled hidden>
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M7 7h10v10H7z"/>
                  </svg>
                </button>
                <button id="send-button" type="submit" class="icon-button primary-button" aria-label="Enviar mensagem" title="Enviar mensagem">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3.4 20.4 21 12 3.4 3.6 3.3 10l12.1 2-12.1 2z"/>
                  </svg>
                </button>
              </div>
            </div>
            <p id="composer-status" class="composer-status" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </section>
  </main>

  <section id="settings-modal" class="settings-modal" hidden>
    <div class="settings-backdrop" data-settings-close="true"></div>
    <div class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settings-title">
      <div class="settings-head">
        <div>
          <p class="eyebrow">Settings</p>
          <h2 id="settings-title" class="section-title small">Seu jeito de conversar</h2>
        </div>
        <button id="settings-close-button" class="sidebar-icon-button ghost-button" type="button" aria-label="Fechar configuracoes" title="Fechar configuracoes">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6.4 5 5.6 5.6L17.6 5 19 6.4 13.4 12 19 17.6 17.6 19 12 13.4 6.4 19 5 17.6 10.6 12 5 6.4z"/></svg>
        </button>
      </div>
      <form id="settings-form" class="settings-form">
        <label>
          Voz da IA
          <select id="settings-voice-select"></select>
        </label>
        <label>
          Como a IA deve responder voce
          <textarea id="settings-response-style" rows="4" placeholder="Ex.: Respostas objetivas, carinhosas, cheias de ideias praticas e exemplos para ministerio infantil."></textarea>
        </label>
        <label>
          Como quer que a IA te chame
          <input id="settings-call-name" type="text" placeholder="Ex.: Tia Rose">
        </label>
        <label>
          Seu sonho no Ministerio Infantil
          <input id="settings-ministry-dream" type="text" placeholder="Ex.: Montar um ministerio criativo, biblico e leve para as criancas.">
        </label>
        <label>
          Seu chamado
          <select id="settings-role-select">
            <option value="Lider">Lider</option>
            <option value="Professor">Professor</option>
            <option value="Voluntario">Voluntario</option>
            <option value="Pastor">Pastor</option>
            <option value="Outro">Outro</option>
          </select>
        </label>
        <div class="settings-actions">
          <button class="ghost-button" type="button" id="settings-cancel-button">Cancelar</button>
          <button class="primary-button" type="submit">Salvar preferencias</button>
        </div>
        <p id="settings-status" class="section-muted"></p>
      </form>
    </div>
  </section>

  <script type="module" src="/explorar.js"></script>
</body>
</html>
