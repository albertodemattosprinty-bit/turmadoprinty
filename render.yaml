services:
  - type: web
    name: turma-do-printy-api
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24.13.1
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CONTENT_BASE_URL
        value: https://pub-3f5e3a74474b4527bc44ecf90f75585a.r2.dev
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_PUBLIC_BASE_URL
        value: https://pub-3f5e3a74474b4527bc44ecf90f75585a.r2.dev
      - key: OPENAI_MODEL
        value: gpt-4.1-nano
      - key: OPENAI_INSTANT_MODEL
        value: gpt-4.1-nano
      - key: OPENAI_INSTANT_MAX_COMPLETION_TOKENS
        value: 120
      - key: OPENAI_FINAL_MAX_COMPLETION_TOKENS
        value: 220
      - key: OPENAI_TRANSCRIBE_MODEL
        value: gpt-4o-mini-transcribe
      - key: DEFAULT_PRODUCT_PRICE_CENTS
        value: 4990
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_TTS_API_KEY
        sync: false
      - key: GOOGLE_TTS_VOICE_NAME
        sync: false
