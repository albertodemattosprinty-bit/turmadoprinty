services:
  - type: web
    name: turma-do-printy-api
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24.13.1
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CONTENT_BASE_URL
        value: https://pub-3f5e3a74474b4527bc44ecf90f75585a.r2.dev
      - key: OPENAI_MODEL
        value: gpt-5
      - key: OPENAI_TRANSCRIBE_MODEL
        value: gpt-4o-mini-transcribe
      - key: DEFAULT_PRODUCT_PRICE_CENTS
        value: 100
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
