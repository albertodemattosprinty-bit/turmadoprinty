<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projeto 200 | Entrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --bg: linear-gradient(180deg, #eef6ff 0%, #dbeafe 42%, #f8fafc 100%);
      --card: rgba(255, 255, 255, 0.92);
      --text: #10213a;
      --muted: #51627c;
      --line: rgba(15, 23, 42, 0.08);
      --primary: #1d4ed8;
      --primary-strong: #1e40af;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Exo 2", sans-serif;
      color: var(--text);
      background: var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .auth-shell {
      width: min(100%, 440px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      padding: 24px;
    }

    .auth-brand {
      display: grid;
      justify-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .auth-brand img {
      width: 88px;
      height: 88px;
      object-fit: contain;
      filter: drop-shadow(0 10px 24px rgba(29, 78, 216, 0.2));
    }

    .auth-brand h1 {
      margin: 0;
      font-size: 1.5rem;
      line-height: 1.1;
    }

    .auth-status {
      margin: 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 18px 0 16px;
    }

    .auth-tab,
    .auth-submit,
    .auth-link,
    .auth-me {
      border: 0;
      border-radius: 16px;
      font: inherit;
    }

    .auth-tab {
      padding: 12px 14px;
      background: #e8eef8;
      color: var(--muted);
      font-weight: 700;
    }

    .auth-tab.active {
      background: var(--primary);
      color: #fff;
    }

    .auth-panel {
      display: grid;
      gap: 12px;
    }

    .auth-panel[hidden] {
      display: none;
    }

    .auth-field {
      display: grid;
      gap: 8px;
    }

    .auth-field span {
      font-size: 0.9rem;
      font-weight: 700;
    }

    .auth-field input {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.55);
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      padding: 14px 16px;
      font: inherit;
      color: var(--text);
    }

    .auth-submit,
    .auth-link,
    .auth-me {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 52px;
      padding: 14px 16px;
      text-decoration: none;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
    }

    .auth-submit {
      margin-top: 6px;
      background: var(--primary);
      color: #fff;
      font-weight: 800;
    }

    .auth-submit:active,
    .auth-link:active,
    .auth-me:active,
    .auth-tab:active {
      transform: scale(0.985);
    }

    .auth-link,
    .auth-me {
      margin-top: 12px;
      background: rgba(148, 163, 184, 0.15);
      color: var(--text);
      font-weight: 700;
    }

    .auth-output {
      margin: 12px 0 0;
      white-space: pre-wrap;
      word-break: break-word;
      color: #b91c1c;
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main class="auth-shell">
    <section id="explore-auth-shell">
      <div class="auth-brand">
        <img src="/200/branding/mindset-trainer.png" alt="Projeto 200">
        <h1>Entrar no Projeto 200</h1>
        <p id="auth-status" class="auth-status" aria-live="polite">Verificando sessao atual...</p>
      </div>

      <div class="auth-tabs" role="tablist" aria-label="Acesso a conta">
        <button class="auth-tab active" type="button" data-auth-tab="login" role="tab" aria-selected="true">Entrar</button>
        <button class="auth-tab" type="button" data-auth-tab="register" role="tab" aria-selected="false">Cadastrar</button>
      </div>

      <div class="auth-panel active" data-auth-panel="login" role="tabpanel">
        <form id="login-form" class="auth-panel">
          <label class="auth-field">
            <span>Usuário</span>
            <input id="login-username" type="text" placeholder="Nome de usuario" aria-label="Nome de usuario">
          </label>
          <label class="auth-field">
            <span>Senha</span>
            <input id="login-password" type="password" placeholder="Senha" aria-label="Senha">
          </label>
          <button type="submit" class="auth-submit">Entrar</button>
        </form>
      </div>

      <div class="auth-panel" data-auth-panel="register" role="tabpanel" hidden>
        <form id="register-form" class="auth-panel">
          <label class="auth-field">
            <span>Nome</span>
            <input id="register-name" type="text" placeholder="Nome" aria-label="Nome">
          </label>
          <label class="auth-field">
            <span>Usuário</span>
            <input id="register-username" type="text" placeholder="Nome de usuario" aria-label="Nome de usuario">
          </label>
          <label class="auth-field">
            <span>Senha</span>
            <input id="register-password" type="password" placeholder="Senha" aria-label="Senha">
          </label>
          <label class="auth-field">
            <span>Confirmar senha</span>
            <input id="register-password-confirm" type="password" placeholder="Confirmar senha" aria-label="Confirmar senha">
          </label>
          <button type="submit" class="auth-submit">Cadastrar</button>
        </form>
      </div>

      <a id="return-link" class="auth-link" href="/200/index.html">Voltar para o Projeto 200</a>
      <pre id="auth-output" class="auth-output" hidden></pre>
      <button id="me-button" class="auth-me" type="button" hidden>Ver minha sessao</button>
    </section>
  </main>

  <script type="module" src="/auth.js"></script>
</body>
</html>
